name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write   # necessario per creare GitHub Releases

jobs:
  build-apk:
    name: Build WebView APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Restore keystore from secret
        run: echo "$KEYSTORE_B64" | base64 -d > fantacaserma.keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Download launcher icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          curl -sL https://darioschioppi.github.io/fantacaserma/icons/icon-512x512.png \
            -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build Release APK
        working-directory: android
        env:
          KS_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KS_KEY_PASS:   ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          gradle assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName="1.${{ github.run_number }}"

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk FantaCaserma.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FantaCaserma-APK
          path: FantaCaserma.apk
          retention-days: 30

      - name: Publish / update GitHub Release "latest"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Elimina il release "latest" precedente (se esiste)
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          # Crea il nuovo release "latest" con l'APK allegato
          NOTES="## FantaCaserma – Build ${{ github.run_number }}

**Commit**: \`$(git rev-parse --short HEAD)\`

### 📱 Installazione Android
1. Scarica il file \`FantaCaserma.apk\`
2. Apri il file sul telefono (abilita *Origini sconosciute* se richiesto)
3. Installa e avvia!

### 🍎 Guida iOS (iPhone/iPad)
👉 https://darioschioppi.github.io/fantacaserma/install-ios.html"

          gh release create latest FantaCaserma.apk \
            --title "FantaCaserma – Ultima versione (build ${{ github.run_number }})" \
            --notes "$NOTES" \
            --latest
