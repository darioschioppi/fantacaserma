name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'
      - 'twa-manifest.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build TWA APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Restore keystore from secret
        run: |
          echo "$KEYSTORE_B64" | base64 -d > fantacaserma.keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Configure Bubblewrap paths
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_SDK_ROOT" \
            > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Bubblewrap build (TWA)
        # Risponde ai 3 prompt interattivi:
        # 1) "regenerate project?" -> n
        # 2) "Password for the Key Store" -> KS_STORE_PASS
        # 3) "Password for the Key" -> KS_KEY_PASS
        run: |
          printf 'n\n%s\n%s\n' "$KS_STORE_PASS" "$KS_KEY_PASS" \
            | bubblewrap build --skipPwaValidation
        env:
          KS_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KS_KEY_PASS: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Locate signed APK
        run: |
          # Bubblewrap firma già il file durante il build
          APK=$(find . -name "app-release-signed.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            # Fallback: cerca qualsiasi APK
            APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          fi
          echo "APK trovato: $APK"
          ls -lh "$APK"
          cp "$APK" fantacaserma-signed.apk
          echo "APK copiato: fantacaserma-signed.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FantaCaserma-APK
          path: fantacaserma-signed.apk
          retention-days: 30
