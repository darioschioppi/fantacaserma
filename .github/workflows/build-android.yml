name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build WebView APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Restore keystore from secret
        run: echo "$KEYSTORE_B64" | base64 -d > fantacaserma.keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Download launcher icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          curl -sL https://darioschioppi.github.io/fantacaserma/icons/icon-512x512.png \
            -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build Release APK
        working-directory: android
        env:
          KS_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KS_KEY_PASS:   ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FantaCaserma-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
